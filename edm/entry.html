<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Shared identity metadata: use the same avatar for the desktop tab,
       homescreen install icon, and other PWA surfaces. -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#f5ede1" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0c1626" media="(prefers-color-scheme: dark)" />
  <title>Manila EDM — Entry</title>
  <link rel="stylesheet" href="assets/site-colors.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--page-bg);
      font-family: "Trebuchet MS", "Verdana", "Segoe UI", sans-serif;
    }
    a { color: var(--link); text-decoration-thickness: 1px; text-underline-offset: 3px; }
    a:hover { color: var(--link-hover); }
    .phone-shell { width: min(430px, 100vw); min-height: 100svh; margin: 0 auto; padding: 12px 12px 92px; display: grid; align-content: start; gap: 12px; }
    /* Full entry pages use the exported thumbnail as a square logo/thumb slot now,
       leaving room for future multi-photo gallery modules later without recropping
       the primary identity image into a poster panorama. */
    .poster { position: relative; width: min(240px, 100%); aspect-ratio: 1 / 1; margin: 0 auto; border-radius: 34px; overflow: hidden; box-shadow: 0 22px 48px var(--shadow); background: var(--blue-deep); display: grid; place-items: center; }
    .poster::before { content: ""; position: absolute; inset: 18px; border: 1px solid rgba(255,250,242,.24); border-radius: 27px; pointer-events: none; z-index: 2; }
    .poster-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }
    .poster-initial { position: relative; z-index: 1; font-size: 4.5rem; font-weight: 900; color: color-mix(in srgb, var(--blue-ink) 88%, transparent); text-shadow: 0 4px 24px rgba(0,0,0,.24); }
    .surface { border: 1px solid var(--line); border-radius: 28px; background: color-mix(in srgb, var(--paper) 90%, transparent); box-shadow: 0 18px 42px var(--shadow); padding: 14px; }
    h1 { margin: 0; font-size: 1.5rem; letter-spacing: -.02em; line-height: 1.1; }
    .entry-city { color: var(--muted); font-size: .82rem; margin-top: 4px; }
    .entry-category {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      color: var(--button-fg);
      font-size: .68rem;
      font-weight: 900;
      margin-top: 6px;
    }
    .entry-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .entry-tag { margin-top: 0; font-size: .66rem; }
    .description { margin: 0; font-size: .92rem; line-height: 1.42; color: var(--ink); }
    .detail-grid { display: grid; gap: 8px; margin-top: 12px; }
    .detail-row { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--line); }
    .detail-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); font-weight: 900; white-space: nowrap; }
    .detail-value { font-size: .88rem; word-break: break-word; }
    .detail-link { color: var(--link); text-decoration: underline; text-underline-offset: 2px; font-weight: 800; }
    .section-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .11em; color: var(--muted); font-weight: 900; margin-top: 12px; margin-bottom: 6px; }
    .event-row { display: grid; grid-template-columns: auto 1fr; gap: 9px; align-items: center; padding: 8px; border: 1px solid var(--line); border-radius: 18px; background: var(--paper-soft); text-decoration: none; margin-top: 6px; }
    .date-chip { width: 46px; min-height: 46px; border-radius: 15px; background: var(--calendar-badge-bg); color: var(--calendar-ink); display: grid; place-items: center; text-align: center; font-weight: 900; line-height: 1; font-size: .78rem; box-shadow: inset 0 1px 0 rgba(255,255,255,.18); border: 1px solid var(--red); }
    .date-chip small { display: block; font-size: .56rem; opacity: .92; text-transform: uppercase; letter-spacing: .08em; }
    .event-row strong { display: block; font-size: .88rem; }
    .event-row span { display: block; color: var(--muted); font-size: .75rem; }
    .related-place { display: inline-flex; align-items: center; padding: 6px 12px; border: 1px solid var(--button-border); border-radius: 14px; background: var(--button-bg); color: var(--button-fg); text-decoration: none; font-size: .82rem; font-weight: 900; margin: 4px 4px 4px 0; }
    .empty-msg { padding: 28px; text-align: center; color: var(--muted); }
    .page-footer { padding: 16px 4px 0; color: var(--muted); font-size: .82rem; line-height: 1.45; border-top: 1px solid var(--line); margin-top: 4px; }
    .page-footer p { margin: 0; }

  </style>
  <link rel="stylesheet" href="assets/site-shell.css" />
</head>
<body>
  <script src="assets/site-shell.js"></script>
  <main class="phone-shell" id="entry-root">
    <div class="empty-msg" id="loading">Loading entry…</div>
  </main>
  <script>
    /* entry.html — MySpace-style single-template data-driven page.
       Reads slug from URL hash (#slug), fetches directory-data.json,
       and renders a full page for that entry. Drafts redirect back
       to directory.html since they don't get full pages yet. */
    function currentLang() {
      const saved = localStorage.getItem('manila-lang') || localStorage.getItem('acadie-lang');
      if (saved === 'tl' || saved === 'en') return saved;
      return 'en';
    }
    function escapeHtml(str) { const d=document.createElement("div"); d.textContent=String(str||""); return d.innerHTML; }
    function normalize(s) { return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, ' ').trim(); }
    function cleanSummary(v) {
      if (v && typeof v === 'object') {
        const lang = currentLang();
        return v[lang] || v.en || v.tl || '';
      }
      return v || '';
    }
    function localized(v) { return cleanSummary(v); }
    function contactValue(item, key) { return (item.contact && item.contact[key]) || item[key] || ''; }
    function publicCity(item) { const d = String(item.public_area || '').trim(); if (d) return d; const a = String(item.area || '').trim(); if (/bathurst/i.test(a)) return 'Metro Manila'; return a || ''; }
    function mapsHref(v) { const q = encodeURIComponent(cleanSummary(v)); return q ? `https://www.google.com/maps/search/?api=1&query=${q}` : ''; }
    function phoneHref(v) { const d = cleanSummary(v).replace(/[^\d+]/g, ''); return d ? `tel:${d}` : ''; }
    function safeImageSrc(value) {
      const raw = String(value || '').trim();
      if (!raw || raw.startsWith('//')) return '';
      try {
        const url = new URL(raw, document.baseURI);
        return (url.protocol === 'http:' || url.protocol === 'https:') ? url.href : '';
      } catch {
        return '';
      }
    }
    function renderDetailLink(label, value) {
      const text = cleanSummary(value); if (!text) return '';
      const lower = String(label || '').toLowerCase();
      if (lower === 'phone') { const h = phoneHref(text); return h ? `<a class="detail-link" href="${h}">${escapeHtml(text)}</a>` : escapeHtml(text); }
      if (lower === 'address') { const h = mapsHref(text); return h ? `<a class="detail-link" href="${h}" target="_blank" rel="noopener noreferrer">${escapeHtml(text)}</a>` : escapeHtml(text); }
      if (lower === 'email') return `<a class="detail-link" href="mailto:${encodeURIComponent(text)}">${escapeHtml(text)}</a>`;
      if (lower === 'website') { const h = /^https?:\/\//i.test(text) ? text : `https://${text}`; return `<a class="detail-link" href="${escapeHtml(h)}" target="_blank" rel="noopener noreferrer">${escapeHtml(text)}</a>`; }
      if (lower === 'instagram' && /^@?[a-z0-9._]+$/i.test(text)) { const handle = text.replace(/^@/, ''); return `<a class="detail-link" href="https://instagram.com/${encodeURIComponent(handle)}" target="_blank" rel="noopener noreferrer">${escapeHtml(text)}</a>`; }
      if ((lower === 'x' || lower === 'twitter') && /^@?[a-z0-9_]+$/i.test(text)) { const handle = text.replace(/^@/, ''); return `<a class="detail-link" href="https://x.com/${encodeURIComponent(handle)}" target="_blank" rel="noopener noreferrer">${escapeHtml(text)}</a>`; }
      return escapeHtml(text);
    }
    function publicDataRows(item) {
      return (Array.isArray(item.public_data) ? item.public_data : []).map(value => {
        const text = cleanSummary(value);
        const split = text.indexOf(':');
        return split > 0 ? [text.slice(0, split).trim(), text.slice(split + 1).trim()] : ['Public', text];
      }).filter(([, value]) => value);
    }
    function descriptionParts(value) {
      const text = cleanSummary(value);
      const parts = text.split(/\s+—\s+/).map(part => part.trim()).filter(Boolean);
      return { full: text, first: parts[0] || text, rest: parts.slice(1).join(' — ') };
    }
    function dateParts(value) { const d = new Date(value || ''); if (Number.isNaN(d.getTime())) return { month: 'TBD', day: '' }; return { month: new Intl.DateTimeFormat(undefined, { month: 'short' }).format(d), day: new Intl.DateTimeFormat(undefined, { day: 'numeric' }).format(d) }; }
    function applyTheme(theme) { document.documentElement.dataset.theme = theme; localStorage.setItem('acadie-theme', theme); }
    const savedTheme = localStorage.getItem('acadie-theme');
    if (savedTheme) applyTheme(savedTheme);
    function updateChromeCopy() {
      document.documentElement.lang = currentLang();
      window.AcadieShell?.sync?.();
    }
    window.addEventListener('acadie:languagechange', () => { updateChromeCopy(); render(); });
    document.documentElement.lang = currentLang();
    updateChromeCopy();

    function safeHashFragment() {
      try { return decodeURIComponent(location.hash.slice(1)).trim(); }
      catch { return ''; }
    }
    const slug = safeHashFragment();
    if (!slug) { location.replace('directory.html'); }

    async function render() {
      const root = document.getElementById('entry-root');
      try {
        const [dirRes, evtRes] = await Promise.all([
          fetch('assets/directory-data.json', { cache: 'no-store' }),
          fetch('assets/events-data.json', { cache: 'no-store' })
        ]);
        const dirData = await dirRes.json();
        const evtData = await evtRes.json();
        const items = dirData.items || [];
        const events = evtData.items || [];
        const item = items.find(i => i.slug === slug);
        if (!item) {
          root.innerHTML = `<div class="empty-msg"><h1>Entry not found</h1><p>No entry matches <code>${escapeHtml(slug)}</code>.</p><p><a href="directory.html">Back to directory</a></p></div>`;
          return;
        }
        // Drafts don't get full pages — redirect to expanded card
        if (item.draft) { location.replace(`directory.html#entry-${encodeURIComponent(item.slug)}`); return; }

        const itemTitle = cleanSummary(item.title_localized) || item.title || 'Entry';
        document.title = `${itemTitle} — Manila EDM`;
        const city = publicCity(item);
        const description = descriptionParts(item.description_localized || item.description || item.summary);
        const detailRows = [
          ['Address', contactValue(item, 'address')],
          ['Hours', contactValue(item, 'hours')],
          ['Phone', contactValue(item, 'phone')],
          ['Email', contactValue(item, 'email')],
          ['Website', contactValue(item, 'website')],
          ...publicDataRows(item),
        ].filter(([, v]) => cleanSummary(v));

        // Related events
        const relatedEvents = events.filter(e => {
          const byEntry = [...(e.host_entry_ids || []), ...(e.performer_entry_ids || []), ...(e.sponsor_entry_ids || [])].includes(item.slug);
          const byLoc = item.location_id && e.location_id === item.location_id;
          return byEntry || byLoc;
        }).sort((a, b) => String(a.starts_at || '').localeCompare(String(b.starts_at || '')));

        // Related places (share same location or cross-referenced)
        const relatedSlugs = new Set([...(item.related_places || [])].map(s => String(s).trim().toLowerCase()));
        const relatedPlaces = items.filter(i => i.slug !== item.slug && !i.draft && (relatedSlugs.has(normalize(i.slug)) || (item.location_id && i.location_id === item.location_id))).slice(0, 6);

        const eventsHtml = relatedEvents.length ? `
          <div class="section-label">Related events</div>
          ${relatedEvents.map(e => {
            const p = dateParts(e.starts_at);
            const title = String(localized(e.title) || e.name || '').replace(/\s+Placeholder\b/i, ' Preview');
            return `<a class="event-row" href="events.html#event-${escapeHtml(e.id)}"><span class="date-chip"><small>${escapeHtml(p.month)}</small>${escapeHtml(p.day)}</span><div><strong>${escapeHtml(title)}</strong><span>${escapeHtml(e.computed_status || '')}</span></div></a>`;
          }).join('')}
        ` : '';

        const placesHtml = relatedPlaces.length ? `
          <div class="section-label">Related places</div>
          <div>${relatedPlaces.map(p => `<a class="related-place" href="entry.html#${escapeHtml(p.slug)}">${escapeHtml(cleanSummary(p.title_localized) || p.title)}</a>`).join('')}</div>
        ` : '';

        const initial = (itemTitle || '?').trim().charAt(0).toUpperCase();
        const thumbnailSrc = safeImageSrc(item.thumbnail_src);
        const thumbnailAlt = String(item.thumbnail_alt || itemTitle || 'Entry photo').trim();

        root.innerHTML = `
          <section class="poster">${thumbnailSrc ? `<img class="poster-image" src="${escapeHtml(thumbnailSrc)}" alt="${escapeHtml(thumbnailAlt)}" />` : `<span class="poster-initial">${escapeHtml(initial)}</span>`}</section>
          <section class="surface">
            <h1>${escapeHtml(itemTitle)}</h1>
            ${city ? `<div class="entry-city">${escapeHtml(city)}</div>` : ''}
            ${description.full ? `<p class="description" style="margin-top:10px">${escapeHtml(description.first)}${description.rest ? `<br>${escapeHtml(description.rest)}` : ''}</p>` : ''}
            ${detailRows.length ? `<div class="detail-grid">${detailRows.map(([label, value]) => `<div class="detail-row"><div class="detail-label">${escapeHtml(label)}</div><div class="detail-value">${renderDetailLink(label, value)}</div></div>`).join('')}</div>` : ''}
          </section>
          ${eventsHtml || placesHtml ? `<section class="surface">${eventsHtml}${placesHtml}</section>` : ''}
          <footer class="page-footer"><p><a href="directory.html">Back to directory</a></p></footer>
        `;
      } catch (err) {
        root.innerHTML = `<div class="empty-msg"><h1>Couldn't load entry</h1><p>${escapeHtml(err.message)}</p></div>`;
      }
    }
    render();
  </script>
</body>
</html>
